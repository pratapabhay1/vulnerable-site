name: Load Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:

      - name: Pull large image
        run: docker pull mcr.microsoft.com/dotnet/sdk:7.0

      - name: Run heavy container 1
        run: docker run -d mcr.microsoft.com/dotnet/sdk:7.0 sleep 300

      - name: Run heavy container 2
        run: docker run -d mcr.microsoft.com/dotnet/sdk:7.0 sleep 300

      - name: List containers
        run: docker ps
