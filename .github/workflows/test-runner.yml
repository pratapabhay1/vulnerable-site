name: Auto Scaling

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        runner: [runner1, runner2]

    runs-on: [self-hosted, ${{ matrix.runner }}]

    steps:
      - name: Show runner
        run: hostname

      - name: Run container
        run: docker run -d python:3.9 sleep 180

      - name: Show containers
        run: docker ps

      - name: Wait
        run: sleep 60
