name: Auto Scaling Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        job: [1, 2, 3]

    steps:
      - name: Show runner
        run: hostname

      - name: Run container
        run: docker run -d python:3.9 sleep 180

      - name: Show running containers
        run: docker ps

      - name: Wait to observe
        run: sleep 90
