name: Auto Scaling Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        job: [1, 2, 3]

    steps:
      - name: Print runner
        run: echo "Running on $(hostname)"

      - name: Memory load
        run: docker run -d python:3.9 bash -c "python3 -c 'a=[]; [a.append(bytearray(1024*1024)) for _ in range(2000)]; import time; time.sleep(120)'"
